services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3012:3000"
    volumes:
      - toodoom_data:/app/data
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/households.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  toodoom_data:
    driver: local
